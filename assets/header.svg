<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="300" style="z-index:1;position:relative" viewBox="0 0 854 300">
  <defs>
    <!-- Black background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    
    <!-- Darker cyan stroke gradient -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#008fb3"/>
      <stop offset="100%" stop-color="#00a8cc"/>
    </linearGradient>
    
    <!-- Subtle glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <style>
      .name {
        font-size: 70px;
        font-weight: 700;
        font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;
        fill: #ffffff;
        stroke: url(#neon);
        stroke-width: 1.5;
        paint-order: stroke fill;
      }
      .website {
        font-size: 16px;
        font-weight: 400;
        font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;
        fill: rgba(255,255,255,0.6);
        letter-spacing: 0.5px;
      }
      .name, .website, .star {
        animation: fadeIn 1.2s ease-in-out forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .star {
        animation: twinkle var(--duration) ease-in-out infinite;
        animation-delay: var(--delay);
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 1; }
      }
    </style>
  </defs>
  
  <!-- Black background -->
  <rect width="854" height="300" fill="url(#bg)"/>
  
  <!-- Twinkling white stars -->
  <circle class="star" cx="50" cy="40" r="1.2" fill="#ffffff" style="--duration: 3s; --delay: 0s"/>
  <circle class="star" cx="120" cy="100" r="1" fill="#ffffff" style="--duration: 4s; --delay: 0.5s"/>
  <circle class="star" cx="200" cy="60" r="1" fill="#ffffff" style="--duration: 2.5s; --delay: 1s"/>
  <circle class="star" cx="280" cy="160" r="1" fill="#ffffff" style="--duration: 3.5s; --delay: 1.5s"/>
  <circle class="star" cx="350" cy="70" r="1" fill="#ffffff" style="--duration: 4s; --delay: 0.3s"/>
  <circle class="star" cx="420" cy="190" r="1" fill="#ffffff" style="--duration: 3s; --delay: 2s"/>
  <circle class="star" cx="500" cy="80" r="1" fill="#ffffff" style="--duration: 2.8s; --delay: 0.8s"/>
  <circle class="star" cx="580" cy="150" r="1" fill="#ffffff" style="--duration: 3.2s; --delay: 1.2s"/>
  <circle class="star" cx="650" cy="50" r="1.2" fill="#ffffff" style="--duration: 4s; --delay: 0s"/>
  <circle class="star" cx="720" cy="120" r="1" fill="#ffffff" style="--duration: 3s; --delay: 1.8s"/>
  <circle class="star" cx="780" cy="200" r="1" fill="#ffffff" style="--duration: 2.5s; --delay: 0.5s"/>
  <circle class="star" cx="100" cy="220" r="1" fill="#ffffff" style="--duration: 3.8s; --delay: 2.2s"/>
  <circle class="star" cx="180" cy="35" r="1" fill="#ffffff" style="--duration: 3s; --delay: 1s"/>
  <circle class="star" cx="320" cy="240" r="1" fill="#ffffff" style="--duration: 4s; --delay: 0.7s"/>
  <circle class="star" cx="450" cy="45" r="1" fill="#ffffff" style="--duration: 2.7s; --delay: 1.5s"/>
  <circle class="star" cx="550" cy="250" r="1" fill="#ffffff" style="--duration: 3.5s; --delay: 0.2s"/>
  <circle class="star" cx="680" cy="90" r="1" fill="#ffffff" style="--duration: 3s; --delay: 1.3s"/>
  <circle class="star" cx="800" cy="55" r="1" fill="#ffffff" style="--duration: 4s; --delay: 2s"/>
  
  <!-- Animated morphing blob (subtle, behind text) -->
  <g transform="translate(427, 140)" opacity="0.25">
    <path fill="url(#neon)" filter="url(#glow)" d="M52.8,-67C68,-61.6,79.7,-45.6,82.5,-28.7C85.4,-11.8,79.5,6,71.4,20.8C63.2,35.5,53,47.1,40.7,53.3C28.5,59.4,14.2,60,-2.1,63C-18.5,65.9,-37,71.2,-52.3,66C-67.6,60.9,-79.7,45.4,-81.5,29C-83.2,12.7,-74.6,-4.4,-68.7,-22.2C-62.8,-40.1,-59.5,-58.7,-48.4,-65.4C-37.4,-72.2,-18.7,-67.1,0,-67.1C18.8,-67.2,37.6,-72.4,52.8,-67Z">
      <animate attributeName="d" dur="10s" repeatCount="indefinite" values="
        M52.8,-67C68,-61.6,79.7,-45.6,82.5,-28.7C85.4,-11.8,79.5,6,71.4,20.8C63.2,35.5,53,47.1,40.7,53.3C28.5,59.4,14.2,60,-2.1,63C-18.5,65.9,-37,71.2,-52.3,66C-67.6,60.9,-79.7,45.4,-81.5,29C-83.2,12.7,-74.6,-4.4,-68.7,-22.2C-62.8,-40.1,-59.5,-58.7,-48.4,-65.4C-37.4,-72.2,-18.7,-67.1,0,-67.1C18.8,-67.2,37.6,-72.4,52.8,-67Z;
