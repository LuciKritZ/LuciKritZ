<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="180" style="z-index:1;position:relative" viewBox="0 0 854 180">
  <defs>
    <!-- Dark background matching header -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    
    <!-- Cyan gradient for blob -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#008fb3"/>
      <stop offset="100%" stop-color="#00a8cc"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <style>
      .quote {
        font-size: 28px; /* Increased from 24px */
        font-weight: 500;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        fill: #e6e6e6;
      }
      .author {
        font-size: 18px; /* Increased from 16px */
        font-weight: 400;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        fill: rgba(255,255,255,0.5);
      }
      .quote, .author {
        animation: fadeIn 1.2s ease-in-out forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .star {
        animation: twinkle var(--d) ease-in-out infinite;
        animation-delay: var(--dl);
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.9; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="854" height="180" fill="url(#bg)"/>
  
  <!-- Twinkling Stars (Expanded for wider canvas) -->
  <circle class="star" cx="50" cy="30" r="1" fill="#ffffff" style="--d:3s;--dl:0s"/>
  <circle class="star" cx="140" cy="60" r="0.8" fill="#ffffff" style="--d:4s;--dl:0.4s"/>
  <circle class="star" cx="220" cy="25" r="1.2" fill="#ffffff" style="--d:2.5s;--dl:0.8s"/>
  <circle class="star" cx="310" cy="140" r="1" fill="#ffffff" style="--d:3.5s;--dl:1.2s"/>
  <circle class="star" cx="400" cy="45" r="1.1" fill="#ffffff" style="--d:4s;--dl:0.2s"/>
  <circle class="star" cx="480" cy="110" r="0.9" fill="#ffffff" style="--d:2.8s;--dl:1.5s"/>
  <circle class="star" cx="560" cy="35" r="1.2" fill="#ffffff" style="--d:3.2s;--dl:0.6s"/>
  <circle class="star" cx="650" cy="150" r="1" fill="#ffffff" style="--d:4s;--dl:1s"/>
  <circle class="star" cx="740" cy="45" r="0.8" fill="#ffffff" style="--d:3s;--dl:1.8s"/>
  <circle class="star" cx="810" cy="120" r="1" fill="#ffffff" style="--d:3.8s;--dl:0.3s"/>
  <circle class="star" cx="830" cy="38" r="1.1" fill="#ffffff" style="--d:2.5s;--dl:1.1s"/>
  <circle class="star" cx="120" cy="155" r="0.9" fill="#ffffff" style="--d:4s;--dl:0.7s"/>
  <circle class="star" cx="350" cy="75" r="1" fill="#ffffff" style="--d:3.5s;--dl:1.4s"/>
  <circle class="star" cx="600" cy="148" r="1.2" fill="#ffffff" style="--d:2.8s;--dl:0.5s"/>
  
  <!-- Morphing Blob (centered) -->
  <g transform="translate(427, 90)" opacity="0.25">
    <path fill="url(#neon)" filter="url(#glow)" d="M52.8,-67C68,-61.6,79.7,-45.6,82.5,-28.7C85.4,-11.8,79.5,6,71.4,20.8C63.2,35.5,53,47.1,40.7,53.3C28.5,59.4,14.2,60,-2.1,63C-18.5,65.9,-37,71.2,-52.3,66C-67.6,60.9,-79.7,45.4,-81.5,29C-83.2,12.7,-74.6,-4.4,-68.7,-22.2C-62.8,-40.1,-59.5,-58.7,-48.4,-65.4C-37.4,-72.2,-18.7,-67.1,0,-67.1C18.8,-67.2,37.6,-72.4,52.8,-67Z">
      <animate attributeName="d" dur="10s" repeatCount="indefinite" values="         M52.8,-67C68,-61.6,79.7,-45.6,82.5,-28.7C85.4,-11.8,79.5,6,71.4,20.8C63.2,35.5,53,47.1,40.7,53.3C28.5,59.4,14.2,60,-2.1,63C-18.5,65.9,-37,71.2,-52.3,66C-67.6,60.9,-79.7,45.4,-81.5,29C-83.2,12.7,-74.6,-4.4,-68.7,-22.2C-62.8,-40.1,-59.5,-58.7,-48.4,-65.4C-37.4,-72.2,-18.7,-67.1,0,-67.1C18.8,-67.2,37.6,-72.4,52.8,-67Z;         M42.3,-55.2C55.2,-48.7,66.6,-37,69.3,-23.7C72,-10.4,66,4.6,58.3,16.1C50.6,27.6,41.2,35.6,31.1,43.9C21.1,52.1,10.6,60.6,-1.3,62.5C-13.2,64.3,-26.4,59.4,-37.6,51.5C-48.8,43.6,-57.9,32.7,-61,20.5C-64.1,8.3,-61.1,-5.3,-57.9,-19.9C-54.7,-34.6,-51.3,-50.3,-41.6,-57.8C-32,-65.3,-16,-64.7,-0.7,-63.7C14.6,-62.8,29.3,-61.6,42.3,-55.2Z;         M49.2,-63.6C62.2,-58.3,70.1,-41.8,74.6,-24.9C79.1,-8.1,80.3,9.2,76.5,26.2C72.8,43.2,64.2,59.9,50.7,68.4C37.1,76.9,18.5,77.2,2.3,74.1C-13.9,70.9,-27.9,64.2,-41.2,55.6C-54.6,47.1,-67.4,36.6,-74.5,22.4C-81.7,8.2,-83.2,-9.7,-74.7,-20.8C-66.3,-31.9,-47.9,-36.3,-33.8,-41.2C-19.7,-46.2,-9.8,-51.8,4.1,-57.5C18.1,-63.1,36.2,-68.9,49.2,-63.6Z;         M52.8,-67C68,-61.6,79.7,-45.6,82.5,-28.7C85.4,-11.8,79.5,6,71.4,20.8C63.2,35.5,53,47.1,40.7,53.3C28.5,59.4,14.2,60,-2.1,63C-18.5,65.9,-37,71.2,-52.3,66C-67.6,60.9,-79.7,45.4,-81.5,29C-83.2,12.7,-74.6,-4.4,-68.7,-22.2C-62.8,-40.1,-59.5,-58.7,-48.4,-65.4C-37.4,-72.2,-18.7,-67.1,0,-67.1C18.8,-67.2,37.6,-72.4,52.8,-67Z"/>
    </path>
  </g>
  
  <!-- Quote Text (perfectly centered with adjusted spacing) -->
  <g transform="translate(427, 90)">
    <text x="0" y="-16" text-anchor="middle" class="quote">"If you think your users are idiots,</text>
    <text x="0" y="14" text-anchor="middle" class="quote">only idiots will use it."</text>
    <text x="0" y="46" text-anchor="middle" class="author">— Linus Torvalds</text>
  </g>
</svg>
